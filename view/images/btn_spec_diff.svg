<svg xmlns="http://www.w3.org/2000/svg" width="120" height="48" viewBox="0 0 120 48">
  <!-- Фон -->
  <rect width="120" height="48" rx="6" fill="#1a1800"/>
  <!-- Подпись -->
  <text x="60" y="12" font-family="monospace" font-size="9" fill="#ffcc00" text-anchor="middle" font-weight="bold">НИП (Δ дБ)</text>
  <!-- Разностная кривая — пик в месте НИП, около нуля везде -->
  <polyline points="4,40 14,40 24,40 34,40 44,40 54,38 64,30 70,14 76,28 82,38 90,40 100,40 110,40 116,40"
            fill="none" stroke="#ffcc00" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Закрашенная площадь под пиком -->
  <polygon points="54,40 64,30 70,14 76,28 82,40"
           fill="#ffcc00" fill-opacity="0.25"/>
  <!-- Горизонтальная ось (нулевая линия) -->
  <line x1="4" y1="40" x2="116" y2="40" stroke="#666" stroke-width="1"/>
  <line x1="4" y1="42" x2="116" y2="42" stroke="#555" stroke-width="1"/>
</svg>
